<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Earth</title>
    <link rel="stylesheet" href="style/style.css" />

    <!-- tailwind & daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body>
    <main class="container mx-auto">
      <h2 class="text-[#15803D] font-bold text-4xl mb-10 text-center">
        Choose Your Trees
      </h2>

      <div class="grid grid-cols-12 gap-8">
        <!-- Categories -->
        <div class="bg-white card card-body shadow-2xl col-span-3 text-center">
          <h2 class="font-bold text-2xl">Categories</h2>
          <div class="space-y-3">
            <button class="btn btn-success w-full" id="allTreesbtn">
              All Trees
            </button>

            <!-- Categories Container -->
            <div id="categoriesContainers" class="space-y-3">
              <!-- Categories will be dynamically loaded here by JavaScript -->
            </div>
          </div>
        </div>

        <!-- Trees -->
        <div class="bg-white card card-body shadow-2xl col-span-6">
          <div id="treeContainer" class="grid grid-cols-1 sm:grid-cols-3 gap-6">

            

          </div>

          <div id="loadingSpinner" class="h-[60vh] hidden justify-center items-center">
            <span class="loading loading-dots loading-lg"></span>
          </div>
        </div>

        <!-- Cart -->
        <div class="bg-green-500 col-span-3 text-center">Cart</div>
      </div>
    </main>

    <script src="script/script.js"></script>
  </body>
</html>
